# AI Code 配置文件
# 优先级：环境变量 > 配置文件 > 默认值

llm:
  provider: iflow          # LLM 提供商: iflow, openai
  model: qwen3-coder-plus  # 使用的模型
  timeout: 180             # 请求超时时间(秒)

ui:
  theme: dark              # 主题: dark, light
  max_lines: 15            # 消息历史最大显示行数

agent:
  max_tokens: 8000         # 最大输出 token 数
  temperature: 0.7         # 温度参数
  thinking: true           # 启用思考模式

logger:
  level: debug              # 日志级别: debug, info, warn, error
  output: log/copilot.log  # 输出位置: stdout, stderr, 文件路径
  format: text             # 格式: text, json
  max_size: 100            # 日志文件最大大小(MB)
  max_backups: 3           # 保留的旧文件数量
  max_age: 30              # 保留天数
  compress: true           # 是否压缩旧文件
